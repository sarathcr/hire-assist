<div class="dropdown" #dropdown>
  <button class="dropdown__trigger" (click)="toggleMenu($event)" [class.dropdown__trigger--active]="showMenu()">
    <ng-content></ng-content>
  </button>

  @if (showMenu()) {
    <div class="dropdown__flyout">
      <!-- User Info Header -->
      <div class="dropdown__header">
        <div class="dropdown__user-avatar">
          {{ userName() | slice:0:1 | uppercase }}
        </div>
        <div class="dropdown__user-details">
          <p class="dropdown__user-name">{{ userName() }}</p>
          <p class="dropdown__user-role">{{ userRole() }}</p>
        </div>
      </div>

      <div class="dropdown__divider"></div>

      <!-- Menu Items -->
      <nav class="dropdown__nav">
        <button class="dropdown__item" (click)="navigateToProfile()">
          <i class="pi pi-user dropdown__item-icon"></i>
          <span>View Profile</span>
        </button>

        <button class="dropdown__item dropdown__item--logout" (click)="handleLogout()">
          <i class="pi pi-sign-out dropdown__item-icon"></i>
          <span>Sign Out</span>
        </button>
      </nav>
    </div>
  }
</div>

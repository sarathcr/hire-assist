<div class="countdown-timer" [class.overtime-active]="isOvertime()">
  <i
    class="pi"
    [ngClass]="isOvertime() ? 'pi-exclamation-circle' : 'pi-clock'"
  ></i>
  <div class="time-container">
    <span class="overtime-prefix" [style.visibility]="isOvertime() ? 'visible' : 'hidden'">+</span>
    <span class="time-value">{{ displayTime() }}</span>
  </div>
  <span class="overtime-label" [style.visibility]="isOvertime() ? 'visible' : 'hidden'">OVERTIME</span>
</div>

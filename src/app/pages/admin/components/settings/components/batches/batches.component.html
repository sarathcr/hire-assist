<div class="batch">
  <div class="batch__header">
    <h1>Batches</h1>
  </div>
  <!-- @if (!isLoading()) { -->
  <app-table
    [tableData]="data"
    [columnsData]="columns"
    [parentLoader]="isLoading"
    [hasSearch]="true"
    [hasCheckbox]="false"
    (edit)="editBatch($event)"
    (delete)="deleteBatch($event)"
    (history)="viewHistory($event)"
    (pageChangeAndSort)="onTablePayloadChange($event)"
  >
    <div class="batch__button">
      <app-button
        [buttonLabel]="'New'"
        icon="pi pi-plus"
        (btnClick)="addNewBatch()"
      ></app-button>
    </div>
  </app-table>
  <app-history-drawer
    [(visible)]="visible"
    [events]="events"
  ></app-history-drawer>
</div>

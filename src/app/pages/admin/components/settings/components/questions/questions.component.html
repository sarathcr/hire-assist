<div class="questions">
  <div class="questions__header">
    <h1>Questions</h1>
  </div>
  <!-- @if (!isLoading()) { -->
  <app-table
    [tableData]="data"
    [parentLoader]="isLoading"
    [columnsData]="columns"
    [hasSearch]="true"
    [hasCheckbox]="false"
    (delete)="deleteQuestion($event)"
    (history)="viewQuestionHistory($event)"
    (pageChangeAndSort)="onTablePayloadChange($event)"
    (edit)="getByIdQuestion($event)"
    (buttonClick)="onButtonClick($event)"
    (rowExpand)="onRowExpand($event)"
    [previewImageUrls]="previewImageUrls"
    [isImageLoadings]="isImageLoadings"
    [onLoadQuestionImage]="loadQuestionImage.bind(this)"
    [onLoadOptionImage]="loadOptionImage.bind(this)"
  >
    <div class="questions__button">
      <app-button
        [buttonLabel]="'New'"
        icon="pi pi-plus"
        (btnClick)="openAddQuestionModal()"
      ></app-button>
    </div>
  </app-table>
  <app-history-drawer 
    [(visible)]="visible" 
    [events]="historyEvents"
    [loading]="historyLoading"
    [showLoadMore]="historyEvents.length < historyPagination.totalRecords"
    (loadMore)="loadMoreHistory()"
  ></app-history-drawer>
</div>

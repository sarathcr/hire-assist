<div class="thank-you">
  <div class="thank-you__wrapper">
    <figure class="thank-you__image">
      <img src="thank-you.png" alt="thank-you" />
    </figure>
    <div class="thank-you__text">
      <p class="thank-you__title">Thank You!</p>
      <p class="thank-you__content">
        You have completed your aptitude test and we will let you know with
        further information shortly. Please contact HR/Invigilators for further
        steps.
      </p>
      <div class="thank-you__btn-wrapper">
        <app-button
          [buttonLabel]="'Go Back'"
          (btnClick)="onGoBackClick()"
        ></app-button>
      </div>
    </div>
  </div>
</div>

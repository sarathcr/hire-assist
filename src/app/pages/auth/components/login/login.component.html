<div class="login-container">
  <!-- Left Section: Form -->
  <div class="auth-form-section">
    <div class="brand-logo">
      <img src="logo.png" alt="HireAssist" />
    </div>

    <div class="form-wrapper">
      <div class="form-header">
        <h1 class="form-title">Welcome Back</h1>
        <p class="form-subtitle">Login to your account to continue</p>
      </div>

      <form [formGroup]="fGroup" class="auth-form">
        <div class="form-group">
          <app-input-text
            [formGroup]="fGroup"
            [type]="'text'"
            [config]="configMap['email']"
          ></app-input-text>
        </div>

        <div class="form-group">
          <app-input-password
            [formGroup]="fGroup"
            [config]="configMap['password']"
          ></app-input-password>
        </div>

        <div class="form-options">
          <button
            type="button"
            class="forgot-password-btn"
            (click)="forgotPassword()"
          >
            Forgot Password?
          </button>
        </div>

        <app-button
          [buttonLabel]="'Sign In'"
          [buttonSize]="'large'"
          [buttonWidth]="'full'"
          [isLoading]="isLoading"
          (click)="onSave()"
          class="submit-btn"
        ></app-button>
      </form>

      <div class="form-footer">
        <p>Don't have an account? <a href="mailto:admin@hireassist.com">Contact Admin</a></p>
      </div>
    </div>
    <!-- Spacer to balance the logo and ensure perfect vertical centering -->
    <div class="form-spacer"></div>
  </div>

  <!-- Right Section: Visual/Carousel -->
  <div class="auth-visual-section">
    <div class="visual-background"></div>
    <div class="carousel-container">
      <p-carousel
        [value]="slides"
        [numVisible]="1"
        [numScroll]="1"
        [circular]="true"
        [autoplayInterval]="5000"
        [showIndicators]="true"
        [showNavigators]="false"
        [responsiveOptions]="responsiveOptions"
      >
        <ng-template let-slide pTemplate="item">
          <div class="glass-card">
            <div class="slide-icon">{{ slide.icon }}</div>
            <h2 class="slide-title">{{ slide.title }}</h2>
            <p class="slide-description">{{ slide.description }}</p>
          </div>
        </ng-template>
      </p-carousel>
    </div>
  </div>
</div>

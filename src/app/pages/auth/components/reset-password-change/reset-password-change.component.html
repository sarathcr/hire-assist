<div class="login-container">
  <!-- Left Section: Form -->
  <div class="auth-form-section">
    <div class="brand-logo">
      <img src="logo.png" alt="HireAssist" />
    </div>

    <div class="form-wrapper">
      <div class="form-header">
        <h1 class="form-title">New Password</h1>
        <p class="form-subtitle">Create a secure password for your account</p>
      </div>

      <form [formGroup]="resetPasswordFormGroup" class="auth-form">
        <div class="form-group">
          <app-input-password
            [formGroup]="resetPasswordFormGroup"
            [config]="configMap['newPassword']"
          ></app-input-password>
        </div>
        <div class="form-group">
          <app-input-password
            [formGroup]="resetPasswordFormGroup"
            [config]="configMap['confirmPassword']"
          ></app-input-password>
        </div>

        <app-button
          [buttonLabel]="'Reset Password'"
          [buttonSize]="'large'"
          [buttonWidth]="'full'"
          [isLoading]="isLoading"
          (click)="onSubmit()"
          class="submit-btn"
        ></app-button>
      </form>

      <div class="form-options center">
        <button type="button" class="forgot-password-btn" (click)="backToLogin()">
          Back to Login
        </button>
      </div>
    </div>
    <div class="form-spacer"></div>
  </div>

  <!-- Right Section: Visual/Carousel -->
  <div class="auth-visual-section">
    <div class="visual-background"></div>
    <div class="carousel-container">
      <p-carousel
        [value]="slides"
        [numVisible]="1"
        [numScroll]="1"
        [circular]="true"
        [autoplayInterval]="5000"
        [showIndicators]="true"
        [showNavigators]="false"
        [responsiveOptions]="responsiveOptions"
      >
        <ng-template let-slide pTemplate="item">
          <div class="glass-card">
            <div class="slide-icon">{{ slide.icon }}</div>
            <h2 class="slide-title">{{ slide.title }}</h2>
            <p class="slide-description">{{ slide.description }}</p>
          </div>
        </ng-template>
      </p-carousel>
    </div>
  </div>
</div>

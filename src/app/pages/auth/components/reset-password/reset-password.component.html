<div class="login-container">
  <!-- Left Section: Form -->
  <div class="auth-form-section">
    <div class="brand-logo">
      <img src="logo.png" alt="HireAssist" />
    </div>

    <div class="form-wrapper">
      <div *ngIf="!isEmailSent; else successView">
        <div class="form-header">
          <h1 class="form-title">Reset Password</h1>
          <p class="form-subtitle">Enter your email to receive a reset link</p>
        </div>

        <form [formGroup]="resetFormGroup" class="auth-form">
          <div class="form-group">
            <app-input-text
              [formGroup]="resetFormGroup"
              [type]="'text'"
              [config]="configMap['email']"
            ></app-input-text>
          </div>

          <app-button
            [buttonLabel]="'Send Reset Link'"
            [buttonSize]="'large'"
            [buttonWidth]="'full'"
            [isLoading]="isLoading"
            (click)="onSubmit()"
            class="submit-btn"
          ></app-button>
        </form>

        <div class="form-options center">
          <button type="button" class="forgot-password-btn" (click)="backToLogin()">
            Back to Login
          </button>
        </div>
      </div>

      <ng-template #successView>
        <div class="form-header">
          <div class="success-icon">📧</div>
          <h1 class="form-title">Email Sent!</h1>
          <p class="form-subtitle">
            Please check your inbox and follow the instructions to reset your password.
          </p>
        </div>
        <div class="form-options center">
          <button type="button" class="forgot-password-btn" (click)="backToLogin()">
            Back to Login
          </button>
        </div>
      </ng-template>
    </div>
    <div class="form-spacer"></div>
  </div>

  <!-- Right Section: Visual/Carousel -->
  <div class="auth-visual-section">
    <div class="visual-background"></div>
    <div class="carousel-container">
      <p-carousel
        [value]="slides"
        [numVisible]="1"
        [numScroll]="1"
        [circular]="true"
        [autoplayInterval]="5000"
        [showIndicators]="true"
        [showNavigators]="false"
        [responsiveOptions]="responsiveOptions"
      >
        <ng-template let-slide pTemplate="item">
          <div class="glass-card">
            <div class="slide-icon">{{ slide.icon }}</div>
            <h2 class="slide-title">{{ slide.title }}</h2>
            <p class="slide-description">{{ slide.description }}</p>
          </div>
        </ng-template>
      </p-carousel>
    </div>
  </div>
</div>
